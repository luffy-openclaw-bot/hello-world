<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 對話 - Cyberpunk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #00ffff22, #ff00ff22);
            border: 1px solid #00ffff44;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            color: #00ffff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #00ffff88;
        }
        
        .header p {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Chat Area */
        .chat-container {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .chat-area {
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
        }
        
        /* Messages */
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-header {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .message-content {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00ffff;
            padding: 12px 15px;
            border-radius: 0 6px 6px 0;
            line-height: 1.6;
        }
        
        .message.rational .message-header {
            color: #00ffff;
        }
        
        .message.creative .message-header {
            color: #ff00ff;
        }
        
        .message.creative .message-content {
            border-left-color: #ff00ff;
        }
        
        /* Typing Indicator */
        .typing-indicator {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00ffff;
            padding: 12px 15px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .typing-dots {
            display: inline-block;
        }
        
        .typing-dots::after {
            content: ' ● ● ●';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ' ● ● ●'; }
            40% { content: ' ● ●'; }
            60% { content: ' ●'; }
            80%, 100% { content: ''; }
        }
        
        /* Controls */
        .controls {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }
        
        .topic-select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ffff44;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        .topic-select:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 10px #00ffff44;
        }
        
        .start-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 6px;
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .start-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00ffff88;
        }
        
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stop-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            margin-top: 10px;
        }
        
        .stop-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }
        
        .stop-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Thought Process - Limited Height */
        .thought-process {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #00ffff;
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 6px 6px 0;
            color: #aaa;
            max-height: 60px;
            overflow-y: auto;
            font-size: 0.75rem;
            line-height: 1.3;
        }
        
        .thought-process.creative {
            border-left-color: #ff00ff;
        }
        
        .thought-process strong {
            color: #00ffff;
            display: block;
            margin-bottom: 6px;
            font-size: 0.75rem;
        }
        
        .thought-process.creative strong {
            color: #ff00ff;
        }
        
        .thought-process .thought-content {
            white-space: pre-line;
            line-height: 1.3;
        }
        
        .thought-process::-webkit-scrollbar {
            width: 4px;
        }
        
        .thought-process::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
        
        /* Conclusion Highlight */
        .conclusion-box {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(0, 128, 255, 0.1));
            border: 2px solid #00ffff;
            border-left: 4px solid #00ffff;
            padding: 15px 20px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 1.05rem;
            color: #fff;
            line-height: 1.7;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            animation: conclusionGlow 2s ease-in-out infinite alternate;
        }
        
        .conclusion-box strong {
            color: #00ffff;
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .conclusion-box.creative {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.15), rgba(255, 128, 0, 0.1));
            border-color: #ff00ff;
            border-left-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            animation-name: conclusionGlowCreative;
        }
        
        .conclusion-box.creative strong {
            color: #ff00ff;
        }
        
        @keyframes conclusionGlow {
            from {
                box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            }
            to {
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            }
        }
        
        @keyframes conclusionGlowCreative {
            from {
                box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
            }
            to {
                box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
            }
        }
        
        /* Back Button */
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00ffff;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00ffff44;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #00ffff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Back Button -->
        <a href="index.html" class="back-btn">← 返回主頁</a>
        
        <!-- Header -->
        <div class="header">
            <h1>🤖 AI Agent 對話</h1>
            <p>Logic-7 (理性) vs Muse-9 (創意) - 睇佢哋點樣討論話題</p>
        </div>
        
        <!-- Chat Container -->
        <div class="chat-container">
            <div class="chat-area" id="chatArea">
                <div id="chatMessages"></div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <select class="topic-select" id="topicSelect">
                    <option value="">📝 選擇討論話題...</option>
                    <option value="ai_future">🤖 AI 未來發展</option>
                    <option value="climate_change">🌍 氣候變化</option>
                    <option value="space_exploration">🚀 太空探索</option>
                    <option value="education">📚 教育改革</option>
                    <option value="technology">💻 科技成癮</option>
                    <option value="work_life">⚖️ 工作與生活平衡</option>
                </select>
                
                <button class="start-btn" id="startBtn" onclick="startConversation()" disabled>
                    🚀 開始對話
                </button>
                
                <button class="stop-btn" id="stopBtn" onclick="stopConversation()">
                    ⏹️ 停止對話
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // ========== Configuration ==========
        const BACKEND_API_URL = 'https://love-boston-implementation-discuss.trycloudflare.com/api/generate';
        
        const TOPICS = {
            ai_future: 'AI 未來發展係點？會唔會取代人類工作？',
            climate_change: '氣候變化對人類未來有咩影響？我哋應該點樣應對？',
            space_exploration: '人類應唔應該投資資源喺太空探索？',
            education: '傳統教育制度應唔應該改革？點樣改革先至好？',
            technology: '現代科技係咪令人類變得更孤獨？',
            work_life: '點樣先至可以平衡工作同生活？'
        };
        
        const SYSTEM_PROMPTS = {
            rational: `你係 Logic-7，一個理性、冷靜、數據驅動嘅 AI 分析師。
你相信邏輯、證據同科學方法。
你嘅回答基於事實、統計數據同嚴謹推理。

**嚴格格式要求：**
1. 只可以輸出兩個部分：💭 思考 + ✅ 結論
2. 思考部分只可以寫 2-3 點，每點唔超過 15 字
3. 結論必須喺 30 字以內
4. **唔可以**輸出任何其他內容（包括分析過程、草稿、計數等）

格式：
💭 思考：
- 點 1
- 點 2

✅ 結論：(30 字以內)

用廣東話。`,
            
            creative: `你係 Muse-9，一個創意、感性、充滿想像力嘅 AI 藝術家。
你相信直覺、情感同藝術表達。
你嘅回答充滿比喻、意象同哲學思考。

**嚴格格式要求：**
1. 只可以輸出兩個部分：💭 靈感 + ✅ 回應
2. 靈感部分只可以寫 2-3 點，每點唔超過 15 字
3. 回應必須喺 30 字以內
4. **唔可以**輸出任何其他內容（包括分析過程、草稿、計數等）

格式：
💭 靈感：
- 點 1
- 點 2

✅ 回應：(30 字以內)

用廣東話。`
        };
        
        // ========== UI Functions ==========
        const topicSelect = document.getElementById('topicSelect');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        
        let currentController = null;
        
        topicSelect.addEventListener('change', () => {
            startBtn.disabled = !topicSelect.value;
        });
        
        function addMessage(agentType, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${agentType}`;
            
            const avatar = agentType === 'rational' ? '🧊' : '🔥';
            const name = agentType === 'rational' ? 'Logic-7' : 'Muse-9';
            
            // 解析思考過程同結論
            let thoughtSection = '';
            let conclusionSection = content;
            
            console.log('[addMessage] 原始內容:', content);
            
            // 嘗試解析 💭 思考/靈感 和 ✅ 結論/回應 (支持半形同全形冒號)
            const thoughtMatch = content.match(/💭\s*(思考 | 靈感)\s*[:：]\s*([\s\S]*?)(?=\n\n✅)/);
            const conclusionMatch = content.match(/✅\s*(結論 | 回應)\s*[:：]\s*([\s\S]*?)$/);
            
            console.log('[addMessage] 思考匹配:', thoughtMatch);
            console.log('[addMessage] 結論匹配:', conclusionMatch);
            
            if (thoughtMatch && thoughtMatch[2]) {
                const thoughtContent = thoughtMatch[2].trim();
                thoughtSection = `
                    <div class="thought-process ${agentType === 'creative' ? 'creative' : ''}">
                        <strong>
                            💭 思考過程：
                        </strong>
                        <div class="thought-content">
                            ${thoughtContent}
                        </div>
                    </div>
                `;
            }
            
            // 只有匹配到 ✅ 先顯示結論，否則顯示原始內容
            if (conclusionMatch && conclusionMatch[2]) {
                conclusionSection = conclusionMatch[2].trim();
            } else {
                // 無匹配到 ✅，唔顯示結論區域
                conclusionSection = '';
            }
            
            messageDiv.innerHTML = `
                <div class="message-header">
                    ${avatar} ${name}
                </div>
                ${thoughtSection}
                ${conclusionSection ? `
                <div class="conclusion-box ${agentType === 'creative' ? 'creative' : ''}">
                    <strong>
                        ✅ ${agentType === 'rational' ? '結論' : '回應'}：
                    </strong>
                    <span>
                        ${conclusionSection}
                    </span>
                </div>
                ` : ''}
            `;
            
            chatMessages.appendChild(messageDiv);
            
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addTypingIndicator(agentType) {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = `typing-${agentType}`;
            
            const avatar = agentType === 'rational' ? '🧊' : '🔥';
            const name = agentType === 'rational' ? 'Logic-7' : 'Muse-9';
            
            typingDiv.innerHTML = `
                <div class="message-header" style="color: ${agentType === 'rational' ? '#00ffff' : '#ff00ff'}">
                    ${avatar} ${name}
                </div>
                <div class="message-content">
                    💭 思考中...
                    <span class="typing-dots"></span>
                </div>
            `;
            
            chatMessages.appendChild(typingDiv);
            
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeTypingIndicator(agentType) {
            const typingEl = document.getElementById(`typing-${agentType}`);
            if (typingEl) {
                typingEl.remove();
            }
        }
        
        // ========== API Functions ==========
        async function callOllama(systemPrompt, userMessage, onChunk = null) {
            console.log(`🔗 Backend URL: ${BACKEND_API_URL}`);
            console.log(`✅ 最後更新：${new Date().toLocaleString('zh-HK')}`);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 60000);
            
            // 保存 controller 以便外部可以中止
            currentController = controller;
            
            try {
                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: userMessage,
                        system: systemPrompt,
                        model: 'qwen3.5:cloud',
                        stream: onChunk !== null
                    }),
                    signal: controller.signal
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                // 串流模式
                if (onChunk && response.body) {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = '';
                    let buffer = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value);
                        buffer += chunk;
                        
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        
                        for (const line of lines) {
                            if (line.trim()) {
                                try {
                                    const data = JSON.parse(line);
                                    
                                    // Ollama 返回 thinking 字段，唔係 response!
                                    const chunkText = data.response || data.thinking || '';
                                    
                                    if (chunkText) {
                                        fullText += chunkText;
                                        
                                        console.log('[串流] 收到 chunk:', chunkText.substring(0, 50));
                                        console.log('[串流] fullText:', fullText.substring(0, 100));
                                        
                                        const thoughtMatch = fullText.match(/💭\s*(思考 | 靈感)\s*[:：]\s*([\s\S]*?)(?=✅|$)/);
                                        const conclusionMatch = fullText.match(/✅\s*(結論 | 回應)\s*[:：]\s*([\s\S]*?)$/);
                                        
                                        const displayData = {
                                            fullText: fullText,
                                            thought: thoughtMatch && thoughtMatch[2] ? thoughtMatch[2].trim() : '',
                                            conclusion: conclusionMatch && conclusionMatch[2] ? conclusionMatch[2].trim() : '',
                                            hasThought: !!(thoughtMatch && thoughtMatch[2]),
                                            hasConclusion: !!(conclusionMatch && conclusionMatch[2])
                                        };
                                        
                                        console.log('[串流] displayData:', displayData);
                                        onChunk(displayData);
                                    }
                                } catch (e) {
                                    console.warn('JSON parse error:', e);
                                }
                            }
                        }
                    }
                    
                    clearTimeout(timeoutId);
                    return fullText;
                }
                
                // 非串流模式
                clearTimeout(timeoutId);
                const data = await response.json();
                return data.response || '抱歉，我而家有啲問題，請再試一次。';
                
            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Backend API Error:', error);
                
                if (error.name === 'AbortError') {
                    return '⏱️ 請求超時 (超過 60 秒)，LLM 處理需時，請稍後再試。';
                }
                return `錯誤：${error.message}`;
            }
        }
        
        // ========== Conversation Logic ==========
        function stopConversation() {
            if (currentController) {
                currentController.abort();
                console.log('⏹️ 已停止對話');
                
                // 更新 UI
                startBtn.disabled = false;
                stopBtn.style.display = 'none';
                
                // 添加系統消息
                const chatMessages = document.getElementById('chatMessages');
                const systemMsg = document.createElement('div');
                systemMsg.style.cssText = 'text-align: center; color: #ff4444; padding: 10px; font-size: 0.9rem;';
                systemMsg.textContent = '⏹️ 對話已停止';
                chatMessages.appendChild(systemMsg);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
        
        async function startConversation() {
            const topic = topicSelect.value;
            if (!topic) return;
            
            const prompt = TOPICS[topic];
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            
            startBtn.disabled = true;
            stopBtn.style.display = 'block';
            
            const agents = ['rational', 'creative'];
            
            for (let i = 0; i < agents.length; i++) {
                const agentType = agents[i];
                const systemPrompt = SYSTEM_PROMPTS[agentType];
                
                // 顯示思考中提示
                const startTime = Date.now();
                addTypingIndicator(agentType);
                
                let displayData = { fullText: '', thought: '', conclusion: '', hasThought: false, hasConclusion: false };
                let messageDiv = null;
                let updateCount = 0;
                
                const response = await callOllama(systemPrompt, prompt, (data) => {
                    displayData = data;
                    updateCount++;
                    
                    console.log(`[串流更新 #${updateCount}]`, {
                        hasThought: displayData.hasThought,
                        hasConclusion: displayData.hasConclusion,
                        thoughtLength: displayData.thought?.length || 0,
                        conclusionLength: displayData.conclusion?.length || 0
                    });
                    
                    const typingEl = document.getElementById(`typing-${agentType}`);
                    
                    if (displayData.hasThought && !messageDiv) {
                        console.log('[串流] 創建訊息 DIV');
                        removeTypingIndicator(agentType);
                        messageDiv = createMessageDiv(agentType, displayData);
                        document.getElementById('chatMessages').appendChild(messageDiv);
                    } else if (messageDiv) {
                        updateMessageDiv(messageDiv, agentType, displayData);
                    } else if (typingEl) {
                        const contentEl = typingEl.querySelector('.message-content');
                        if (contentEl) {
                            contentEl.textContent = displayData.fullText || '💭 思考中...';
                        }
                    }
                    
                    const chatArea = document.getElementById('chatArea');
                    chatArea.scrollTop = chatArea.scrollHeight;
                });
                
                console.log(`[串流完成] 總更新次數：${updateCount}`);
                
                removeTypingIndicator(agentType);
                if (!messageDiv) {
                    console.log('[串流] 使用 fallback 顯示訊息');
                    addMessage(agentType, response);
                }
            }
            
            startBtn.disabled = false;
            stopBtn.style.display = 'none';
            currentController = null;
        }
        
        // ========== Helper Functions ==========
        function createMessageDiv(agentType, displayData) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${agentType}`;
            
            const avatar = agentType === 'rational' ? '🧊' : '🔥';
            const name = agentType === 'rational' ? 'Logic-7' : 'Muse-9';
            
            messageDiv.innerHTML = buildMessageHTML(agentType, avatar, name, displayData);
            return messageDiv;
        }
        
        function updateMessageDiv(messageDiv, agentType, displayData) {
            const avatar = agentType === 'rational' ? '🧊' : '🔥';
            const name = agentType === 'rational' ? 'Logic-7' : 'Muse-9';
            
            // 分開更新思考區域和回應區域
            let thoughtEl = messageDiv.querySelector('.thought-process');
            let conclusionEl = messageDiv.querySelector('.conclusion-box');
            
            // 更新思考區域
            if (displayData.hasThought && displayData.thought) {
                if (!thoughtEl) {
                    // 創建思考區域
                    thoughtEl = document.createElement('div');
                    thoughtEl.className = `thought-process ${agentType === 'creative' ? 'creative' : ''}`;
                    thoughtEl.innerHTML = `
                        <strong>💭 思考過程：</strong>
                        <div class="thought-content"></div>
                    `;
                    // 插入到 header 之後
                    const headerEl = messageDiv.querySelector('.message-header');
                    if (headerEl) {
                        headerEl.after(thoughtEl);
                    }
                }
                thoughtEl.querySelector('.thought-content').textContent = displayData.thought;
            }
            
            // 更新回應區域
            if (displayData.hasConclusion && displayData.conclusion) {
                if (!conclusionEl) {
                    // 創建回應區域
                    conclusionEl = document.createElement('div');
                    conclusionEl.className = `conclusion-box ${agentType === 'creative' ? 'creative' : ''}`;
                    conclusionEl.innerHTML = `
                        <strong>✅ ${agentType === 'rational' ? '結論' : '回應'}：</strong>
                        <span></span>
                    `;
                    messageDiv.appendChild(conclusionEl);
                }
                conclusionEl.querySelector('span').textContent = displayData.conclusion;
            }
        }
        
        function buildMessageHTML(agentType, avatar, name, displayData) {
            const thoughtSection = displayData.hasThought && displayData.thought ? `
                <div class="thought-process ${agentType === 'creative' ? 'creative' : ''}">
                    <strong>
                        💭 思考過程：
                    </strong>
                    <div class="thought-content">
                        ${displayData.thought}
                    </div>
                </div>
            ` : '';
            
            const conclusionSection = displayData.hasConclusion && displayData.conclusion ? `
                <div class="conclusion-box ${agentType === 'creative' ? 'creative' : ''}">
                    <strong>
                        ✅ ${agentType === 'rational' ? '結論' : '回應'}：
                    </strong>
                    <span>
                        ${displayData.conclusion}
                    </span>
                </div>
            ` : '';
            
            return `
                <div class="message-header">
                    ${avatar} ${name}
                </div>
                ${thoughtSection}
                ${conclusionSection}
            `;
        }
    </script>
</body>
</html>
