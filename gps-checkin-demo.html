<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS 打卡系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        body { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <header class="bg-blue-900 text-white py-4 border-b-4 border-red-600">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-xl font-bold">📍 GPS 打卡系統</h1>
        </div>
    </header>

    <!-- 首頁：場景選擇 -->
    <div id="caseSelectPage" class="page active">
        <div class="max-w-4xl mx-auto py-8 px-4">
            <h2 class="text-2xl font-bold text-center mb-6">選擇演示場景</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div onclick="selectCase('login')" class="bg-white p-6 rounded shadow border-l-4 border-blue-900 cursor-pointer">
                    <h3 class="font-bold text-lg mb-2">👤 員工登入版</h3>
                    <ul class="text-sm text-gray-600 space-y-1">
                        <li>✓ 需要登入</li>
                        <li>✓ 關聯賬戶</li>
                    </ul>
                </div>
                <div onclick="selectCase('nodevice')" class="bg-white p-6 rounded shadow border-l-4 border-blue-900 cursor-pointer">
                    <h3 class="font-bold text-lg mb-2">📱 員工免登版</h3>
                    <ul class="text-sm text-gray-600 space-y-1">
                        <li>✓ 無需登入</li>
                        <li>✓ 註冊設備</li>
                    </ul>
                </div>
                <div onclick="selectCase('admin')" class="bg-white p-6 rounded shadow border-l-4 border-blue-900 cursor-pointer md:col-span-3">
                    <h3 class="font-bold text-lg mb-2">👨‍💼 管理員模式</h3>
                    <ul class="text-sm text-gray-600 space-y-1">
                        <li>✓ Dashboard</li>
                        <li>✓ 打卡記錄</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 登入頁面 -->
    <div id="loginPage" class="page">
        <div class="max-w-md mx-auto py-8 px-4">
            <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900">
                <h2 class="text-xl font-bold mb-4">🔐 員工登入</h2>
                <input type="email" id="email" value="employee@gps-checkin.com" class="w-full border p-2 mb-3 rounded" placeholder="郵箱">
                <input type="password" id="password" value="employee123" class="w-full border p-2 mb-4 rounded" placeholder="密碼">
                <button onclick="doLogin()" class="w-full bg-blue-900 text-white py-2 rounded font-bold">登入</button>
                <button onclick="showPage('caseSelectPage')" class="w-full mt-2 text-blue-900 text-sm">← 返回</button>
            </div>
        </div>
    </div>

    <!-- 設備註冊頁面 -->
    <div id="devicePage" class="page">
        <div class="max-w-md mx-auto py-8 px-4">
            <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900">
                <h2 class="text-xl font-bold mb-4">📱 設備已註冊</h2>
                <div class="bg-green-50 border-l-4 border-green-600 p-3 mb-4">
                    <p class="text-sm text-green-800">✓ 設備 ID: DEV-001</p>
                    <p class="text-sm text-green-800">員工：陳大文</p>
                </div>
                <button onclick="goToCheckin()" class="w-full bg-red-600 text-white py-2 rounded font-bold">📍 開始打卡</button>
                <button onclick="showPage('caseSelectPage')" class="w-full mt-2 text-blue-900 text-sm">← 返回</button>
            </div>
        </div>
    </div>

    <!-- 打卡頁面 -->
    <div id="checkinPage" class="page">
        <div class="max-w-4xl mx-auto py-8 px-4">
            <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900 mb-4">
                <h3 class="font-bold mb-3">📍 當前位置</h3>
                <div id="locationInfo" class="bg-gray-50 p-3 rounded">獲取 GPS 中...</div>
            </div>
            
            <!-- 自拍功能 -->
            <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900 mb-4">
                <h3 class="font-bold mb-3">📸 自拍驗證</h3>
                <!-- 相機視頻 -->
                <div class="relative w-full bg-gray-900 rounded mb-3" style="max-width: 400px; margin: 0 auto; aspect-ratio: 3/4;">
                    <video id="camera" autoplay playsinline class="absolute inset-0 w-full h-full object-cover rounded"></video>
                </div>
                <canvas id="photoCanvas" class="hidden"></canvas>
                <p class="text-sm text-gray-600 mb-2 text-center">✓ 相機已自動開啟，直接打卡即可</p>
                <!-- 照片預覽 -->
                <div id="photoPreview" class="hidden mt-3">
                    <p class="text-sm text-green-700 font-bold mb-2 text-center">✓ 已拍照</p>
                    <div class="relative w-full bg-gray-100 rounded" style="max-width: 400px; margin: 0 auto; aspect-ratio: 3/4;">
                        <img id="photoImage" class="absolute inset-0 w-full h-full object-cover rounded border-2 border-green-600">
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="doCheckin('checkin')" id="checkinBtn" disabled class="bg-green-600 text-white py-4 rounded font-bold disabled:opacity-50">🌅 上班</button>
                <button onclick="doCheckin('checkout')" id="checkoutBtn" disabled class="bg-blue-900 text-white py-4 rounded font-bold disabled:opacity-50">🌆 下班</button>
            </div>
            <button onclick="showPage('caseSelectPage')" class="w-full mt-4 text-blue-900 text-sm">← 返回</button>
        </div>
    </div>

    <!-- Dashboard 頁面 -->
    <div id="dashboardPage" class="page">
        <div class="max-w-4xl mx-auto py-8 px-4">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900">
                    <p class="text-sm text-gray-600">總員工數</p>
                    <p class="text-3xl font-bold text-blue-900">12</p>
                </div>
                <div class="bg-white p-6 rounded shadow border-l-4 border-green-600">
                    <p class="text-sm text-gray-600">已打卡</p>
                    <p class="text-3xl font-bold text-green-600">10</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded shadow border-l-4 border-blue-900">
                <h3 class="font-bold mb-4">📋 打卡記錄</h3>
                <table class="w-full text-sm">
                    <thead class="bg-blue-50">
                        <tr>
                            <th class="text-left p-2">姓名</th>
                            <th class="text-left p-2">類型</th>
                            <th class="text-left p-2">時間</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-t"><td class="p-2">陳大文</td><td>🌅 上班</td><td>09:00</td></tr>
                        <tr class="border-t"><td class="p-2">陳大文</td><td>🌆 下班</td><td>18:00</td></tr>
                        <tr class="border-t"><td class="p-2">李小明</td><td>🌅 上班</td><td>09:15</td></tr>
                    </tbody>
                </table>
            </div>
            <button onclick="showPage('caseSelectPage')" class="w-full mt-4 text-blue-900 text-sm">← 返回</button>
        </div>
    </div>

    <script>
        var stream = null;

        // 頁面切換函數
        function showPage(pageId) {
            console.log('Showing page:', pageId);
            document.querySelectorAll('.page').forEach(function(page) {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // 選擇場景
        function selectCase(caseType) {
            console.log('Selecting case:', caseType);
            if (caseType === 'login') {
                showPage('loginPage');
            } else if (caseType === 'nodevice') {
                showPage('devicePage');
            } else if (caseType === 'admin') {
                showPage('dashboardPage');
            }
        }

        // 開啟相機
        function startCamera() {
            console.log('Starting camera');
            var video = document.getElementById('camera');
            
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                    .then(function(mediaStream) {
                        video.srcObject = mediaStream;
                        stream = mediaStream;
                        document.getElementById('takePhotoBtn').disabled = false;
                        console.log('Camera started');
                    })
                    .catch(function(error) {
                        console.error('Camera error:', error);
                        alert('無法開啟相機：' + error.message);
                    });
            } else {
                alert('您的瀏覽器不支持相機功能');
            }
        }

        // 拍照
        function takePhoto() {
            console.log('Taking photo');
            var video = document.getElementById('camera');
            var canvas = document.getElementById('photoCanvas');
            var context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            var dataURL = canvas.toDataURL('image/png');
            var photoImage = document.getElementById('photoImage');
            photoImage.src = dataURL;
            
            document.getElementById('photoPreview').classList.remove('hidden');
            console.log('Photo taken');
        }

        // 登入
        function doLogin() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            console.log('Login attempt:', email);
            
            if (email === 'employee@gps-checkin.com' && password === 'employee123') {
                console.log('Login success');
                goToCheckin();
            } else {
                alert('郵箱或密碼錯誤');
            }
        }

        // 進入打卡頁面
        function goToCheckin() {
            console.log('Going to checkin page');
            showPage('checkinPage');
            getLocation();
            // 自動開啟相機
            setTimeout(function() {
                startCamera();
            }, 1000);
        }

        // 獲取 GPS
        function getLocation() {
            console.log('Getting location');
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        var lat = position.coords.latitude.toFixed(6);
                        var lng = position.coords.longitude.toFixed(6);
                        document.getElementById('locationInfo').innerHTML = 
                            '<p class="text-green-700">✓ GPS 定位成功</p>' +
                            '<p class="text-sm">緯度：' + lat + '</p>' +
                            '<p class="text-sm">經度：' + lng + '</p>';
                        document.getElementById('checkinBtn').disabled = false;
                        document.getElementById('checkoutBtn').disabled = false;
                    },
                    function(error) {
                        var lat = (22.3193 + (Math.random() - 0.5) * 0.01).toFixed(6);
                        var lng = (114.1694 + (Math.random() - 0.5) * 0.01).toFixed(6);
                        document.getElementById('locationInfo').innerHTML = 
                            '<p class="text-orange-700">⚠️ 使用模擬位置</p>' +
                            '<p class="text-sm">緯度：' + lat + '</p>' +
                            '<p class="text-sm">經度：' + lng + '</p>';
                        document.getElementById('checkinBtn').disabled = false;
                        document.getElementById('checkoutBtn').disabled = false;
                    }
                );
            } else {
                document.getElementById('locationInfo').innerHTML = '<p class="text-red-600">❌ 不支持 GPS</p>';
            }
        }

        // 打卡
        function doCheckin(type) {
            console.log('Checkin:', type);
            
            // 自動拍照
            var video = document.getElementById('camera');
            var canvas = document.getElementById('photoCanvas');
            
            if (video && canvas) {
                // 檢查視頻是否已準備好
                if (video.videoWidth > 0 && video.videoHeight > 0) {
                    // 相機已開啟，自動拍照
                    var context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    var dataURL = canvas.toDataURL('image/png');
                    var photoImage = document.getElementById('photoImage');
                    photoImage.src = dataURL;
                    document.getElementById('photoPreview').classList.remove('hidden');
                    
                    console.log('Auto photo taken');
                } else {
                    console.log('Camera not ready yet');
                }
            } else {
                console.log('Camera elements not found');
            }
            
            // 顯示成功消息（視覺反饋）
            var now = new Date();
            var timeStr = now.toLocaleTimeString('zh-HK');
            var photoTaken = !document.getElementById('photoPreview').classList.contains('hidden');
            
            // 創建視覺反饋
            var messageDiv = document.createElement('div');
            messageDiv.className = 'bg-green-600 text-white text-center py-4 px-6 rounded-lg font-bold mt-4';
            messageDiv.innerHTML = '✅ 打卡成功！<br>時間：' + timeStr + (photoTaken ? '<br>✓ 已拍照驗證' : '');
            
            // 移除舊的消息
            var oldMessage = document.querySelector('.checkin-success-message');
            if (oldMessage) oldMessage.remove();
            
            messageDiv.classList.add('checkin-success-message');
            
            // 添加到打卡按鈕下方
            var checkinPage = document.getElementById('checkinPage');
            var buttonsDiv = checkinPage.querySelector('.grid.grid-cols-2');
            buttonsDiv.parentNode.insertBefore(messageDiv, buttonsDiv.nextSibling);
            
            // 3 秒後移除
            setTimeout(function() {
                messageDiv.remove();
            }, 3000);
            
            // 仍然顯示 Alert
            var message = (type === 'checkin' ? '上班' : '下班') + '打卡成功！\n時間：' + timeStr;
            if (photoTaken) {
                message += '\n✓ 已拍照驗證';
            }
            alert(message);
        }

        // 初始化
        console.log('Page loaded');
        showPage('caseSelectPage');
    </script>
</body>
</html>
